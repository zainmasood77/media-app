services:
  backend:
    build: .
    container_name: media-backend
    ports:
      - "5000:5000"

  frontend:
    image: nginx:latest
    container_name: media-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
